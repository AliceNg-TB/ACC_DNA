<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>會計師潛能測驗 | 手機版</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Lexend:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #eef2f5 0%, #d9e2e8 100%);
            font-family: 'Inter', 'Lexend', sans-serif;
            padding: 1rem 0.8rem 2rem;
            position: relative;
            min-height: 100vh;
            overflow-x: hidden;
            font-size: 16px; /* 基礎字體增大，手機易讀 */
        }

        /* 幸運草背景 (適度保留氛圍，不干擾觸控) */
        .lucky-grass {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .clover {
            position: absolute;
            color: rgba(70, 110, 90, 0.2);
            font-size: 2rem;
            animation: floatClover 10s infinite ease-in-out;
        }

        @keyframes floatClover {
            0% { transform: translateY(0px) rotate(0deg); opacity: 0.2; }
            50% { transform: translateY(-15px) rotate(6deg); opacity: 0.45; }
            100% { transform: translateY(0px) rotate(0deg); opacity: 0.2; }
        }

        /* 減少數量使手機更流暢 */
        .clover:nth-child(1) { left: 5%; top: 12%; font-size: 2rem; animation-duration: 14s; }
        .clover:nth-child(2) { left: 85%; top: 25%; font-size: 1.6rem; animation-duration: 11s; }
        .clover:nth-child(3) { left: 12%; top: 70%; font-size: 2.2rem; animation-duration: 15s; }
        .clover:nth-child(4) { left: 75%; top: 80%; font-size: 1.7rem; animation-duration: 12s; }
        .clover:nth-child(5) { left: 45%; top: 45%; font-size: 1.9rem; animation-duration: 13s; }

        .container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* 主要卡片 — 手機加大圓角，內縮適中 */
        .card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(100, 130, 110, 0.3);
        }

        .header {
            background: #2c5e4a;
            padding: 1.3rem 1.2rem;
            color: white;
            background-image: radial-gradient(circle at 10% 30%, rgba(200, 230, 180, 0.2) 2%, transparent 2.5%);
            background-size: 26px 26px;
        }

        .header h1 {
            font-size: 1.65rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .header h1 i { font-size: 1.8rem; color: #d4f0c0; }

        .sub {
            font-size: 0.85rem;
            opacity: 0.9;
            margin-top: 8px;
            border-left: 3px solid #b8dc8c;
            padding-left: 0.8rem;
        }

        /* 學號登入區塊 - 手機友善按壓 */
        .login-area {
            background: #fefce6;
            border-radius: 1.8rem;
            padding: 1rem 1.2rem;
            margin: 1.2rem 1.2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 12px;
            border: 1px solid #cce0b8;
        }

        .input-group {
            flex: 2;
            min-width: 170px;
        }

        .input-group label {
            font-weight: 600;
            color: #2c5e4a;
            font-size: 0.8rem;
            margin-bottom: 6px;
            display: block;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 60px;
            border: 1px solid #c2dab0;
            background: white;
            font-size: 1rem;
            font-family: inherit;
            transition: 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #3e7b52;
            box-shadow: 0 0 0 3px rgba(62, 123, 82, 0.2);
        }

        .warning-tip {
            background: #fff3db;
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 0.7rem;
            color: #7a6300;
        }

        /* 題目區域 — 增大點擊範圍 */
        .questions-section {
            padding: 0 1rem 0.5rem 1rem;
        }

        .question-item {
            background: #ffffffdd;
            border-radius: 1.6rem;
            margin-bottom: 1.1rem;
            padding: 1rem 1rem;
            border: 1px solid #e2f0d4;
            transition: background 0.1s ease;
        }

        .q-text {
            font-weight: 600;
            font-size: 1rem;
            color: #1e3d2f;
            margin-bottom: 14px;
            display: flex;
            gap: 12px;
            align-items: baseline;
            line-height: 1.35;
        }

        .q-num {
            background: #d9e8cf;
            border-radius: 40px;
            width: 30px;
            height: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        /* 量表選項 — 手機觸控膠囊風格 */
        .scale {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-top: 6px;
        }

        .scale-option {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: #ffffff;
            padding: 8px 16px;
            border-radius: 60px;
            border: 1px solid #cde0bc;
            transition: all 0.1s;
            cursor: pointer;
            flex: 0 0 auto;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .scale-option:active {
            background-color: #eef3e8;
            transform: scale(0.97);
        }

        .scale-option input {
            accent-color: #3b7b53;
            width: 18px;
            height: 18px;
            margin: 0;
            cursor: pointer;
            pointer-events: auto;
        }

        .scale-option label {
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            color: #2b4f3c;
        }

        /* 輔助小字 */
        .scale-hint {
            font-size: 0.65rem;
            color: #6d8f5c;
            margin-left: 4px;
            flex-basis: 100%;
        }

        /* 按鈕區塊 */
        .button-group {
            padding: 0.6rem 1.2rem 1.6rem;
            display: flex;
            justify-content: center;
        }

        .btn {
            border: none;
            padding: 14px 20px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            background: #2c5e4a;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            width: 100%;
            box-shadow: 0 6px 14px rgba(44, 94, 74, 0.35);
            transition: 0.15s;
            font-family: inherit;
        }

        .btn:active {
            transform: scale(0.97);
            background: #234e3d;
        }

        /* 教師面板區 */
        .teacher-panel { display: none; }
        .teacher-panel.visible-panel { display: block; margin-top: 1rem; }

        .teacher-card {
            background: #edf5e6;
            border-radius: 2rem;
            border: 1px solid #bdd6a8;
            overflow: hidden;
        }

        .panel-header {
            background: #ddecd0;
            padding: 1rem 1.2rem;
            font-weight: 700;
            color: #2a573c;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 0.9rem;
        }

        .panel-content { padding: 1rem; }

        .export-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .export-buttons .btn {
            width: auto;
            flex: 1;
            padding: 10px 12px;
            font-size: 0.85rem;
            background: #2c5e4a;
        }

        .export-buttons .btn:last-child {
            background: #cdaf95;
            color: #3e2a1f;
            box-shadow: none;
        }

        .submission-list {
            max-height: 280px;
            overflow-y: auto;
            background: #ffffffc9;
            border-radius: 1.2rem;
            padding: 0.6rem;
            font-size: 0.75rem;
        }

        .submission-item {
            border-bottom: 1px solid #cde0bc;
            padding: 10px 6px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 6px;
        }

        hr { margin: 1rem 0; border-color: #cde0bc; }

        .teacher-entrance {
            text-align: center;
            margin-top: 0.2rem;
            margin-bottom: 0.6rem;
        }

        .teacher-entrance button {
            background: #ffffffd9;
            border: 1px solid #b1cf96;
            padding: 8px 22px;
            border-radius: 60px;
            font-size: 0.8rem;
            color: #457a5a;
            font-weight: 600;
            backdrop-filter: blur(2px);
        }

        /* 模態框 (手機友好) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(30, 40, 20, 0.8);
            backdrop-filter: blur(6px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.2s ease;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-container {
            background: #fffef7;
            border-radius: 2.2rem;
            max-width: 88%;
            width: 320px;
            padding: 1.8rem 1.2rem;
            text-align: center;
            box-shadow: 0 30px 40px rgba(0,0,0,0.2);
            border: 1px solid #d9e8c5;
            animation: pop 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .flower-icon {
            font-size: 3.2rem;
            color: #e08f4a;
            margin-bottom: 10px;
            animation: gentleFloat 0.8s infinite alternate;
        }

        @keyframes gentleFloat {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-6px); }
        }

        .modal-title {
            font-size: 1.45rem;
            font-weight: 700;
            color: #2c5e4a;
            margin-bottom: 12px;
        }

        .score-detail {
            background: #eef3e8;
            border-radius: 1.2rem;
            padding: 0.7rem;
            margin: 14px 0;
            font-size: 0.85rem;
            text-align: left;
        }

        .closing-btn {
            background: #2c5e4a;
            color: white;
            border: none;
            padding: 12px 22px;
            border-radius: 60px;
            margin-top: 14px;
            font-weight: 600;
            font-size: 1rem;
            width: 80%;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #55806a;
            margin-top: 1rem;
            padding-bottom: 0.5rem;
        }

        /* 額外手機改善：增加滾動流暢度 */
        @media (max-width: 480px) {
            body {
                padding: 0.7rem 0.6rem 1.5rem;
            }
            .header h1 {
                font-size: 1.45rem;
            }
            .scale-option {
                padding: 6px 14px;
            }
            .scale-option label {
                font-size: 0.9rem;
            }
            .btn {
                padding: 14px 12px;
            }
            .question-item {
                padding: 0.9rem;
            }
            .q-text {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
<div class="lucky-grass">
    <i class="fas fa-leaf clover"></i>
    <i class="fas fa-seedling clover"></i>
    <i class="fas fa-leaf clover"></i>
    <i class="fas fa-seedling clover"></i>
    <i class="fas fa-leaf clover"></i>
</div>
<div class="container">
    <div class="card">
        <div class="header">
            <h1><i class="fas fa-calculator"></i> 會計師潛能測驗 <i class="fas fa-leaf" style="color:#c8e6a5;"></i></h1>
            <div class="sub">🧾 誠信·精確·責任·分析 | 發掘你的會計師特質</div>
        </div>
        <div class="login-area">
            <div class="input-group">
                <label><i class="fas fa-id-card"></i> 學號登入 (必填)</label>
                <input type="text" id="studentId" placeholder="例: ACC2024001" autocomplete="off">
            </div>
            <div class="warning-tip"><i class="fas fa-info-circle"></i> 填寫學號後完整作答</div>
        </div>
        <div class="questions-section" id="questionsContainer"></div>
        <div class="button-group">
            <button class="btn btn-primary" id="submitBtn"><i class="fas fa-check-circle"></i> 提交測驗 & 獲得分析</button>
        </div>
    </div>

    <div class="teacher-entrance">
        <button id="teacherPortalBtn"><i class="fas fa-chalkboard-user"></i> 教師專區 · 收集數據</button>
    </div>
    <div id="teacherPanel" class="teacher-panel">
        <div class="teacher-card">
            <div class="panel-header">
                <span><i class="fas fa-chalkboard-teacher"></i> 📊 答案收集系統</span>
                <span id="submissionCountDisplay">累積提交: 0 筆</span>
            </div>
            <div class="panel-content">
                <div class="export-buttons">
                    <button class="btn" id="exportCsvBtn"><i class="fas fa-download"></i> 匯出CSV</button>
                    <button class="btn" id="clearAllDataBtn"><i class="fas fa-trash-alt"></i> 清空紀錄</button>
                </div>
                <div style="font-size:0.75rem; margin-bottom:6px;"><i class="fas fa-database"></i> 學員測驗紀錄（含各維度分數）</div>
                <div id="submissionList" class="submission-list">
                    <div style="color: #769e6b; text-align: center; padding: 12px;">📭 尚無提交紀錄</div>
                </div>
                <hr>
                <div style="font-size:0.65rem; color:#4b6b3b;"><i class="fas fa-lightbulb"></i> 資料儲存於此裝置，教師可匯出進行甄選。</div>
            </div>
        </div>
    </div>
    <footer>🍀 點擊選項作答，提交後獲得潛能報告與專屬祝福 | 手機版優化</footer>
</div>

<div id="resultModal" class="modal-overlay">
    <div class="modal-container">
        <div class="flower-icon"><i class="fas fa-seedling"></i><i class="fas fa-chart-line"></i>🌸</div>
        <div class="modal-title">會計師潛能報告</div>
        <div id="modalScoreContent" style="font-size:0.9rem; margin:8px 0;"></div>
        <div id="flowerMessage" style="color:#c4511b; font-weight:500;">🎁 你的會計師特質解密</div>
        <button class="closing-btn" id="closeModalBtn">收下祝福 ✨</button>
    </div>
</div>

<script>
    // 會計師潛能20題 (五大核心特質)
    const QUESTIONS = [
        { text: "即使沒有人監督，我也會主動遵守法規與公司政策。", dim: "integrity" },
        { text: "我能專注處理大量數字資料，很少發生錯誤。", dim: "precision" },
        { text: "遇到複雜的帳務問題，我會冷靜拆解邏輯、逐步解決。", dim: "analytical" },
        { text: "我會為了如期完成報表而加班，不輕易放棄。", dim: "responsibility" },
        { text: "我經常反覆檢查自己的計算與記錄，確保完全正確。", dim: "precision" },
        { text: "我認為誠實申報比短暫利益更重要。", dim: "integrity" },
        { text: "我擅長從雜亂數據中找出異常或不合邏輯之處。", dim: "analytical" },
        { text: "即使面對壓力，我仍能保持情緒平穩、不影響判斷。", dim: "emotional" },
        { text: "我樂於承擔責任，不會推卸過錯。", dim: "responsibility" },
        { text: "我習慣用系統化方法整理工作，減少遺漏。", dim: "precision" },
        { text: "我願意花時間確認每一筆金額的來源與憑證。", dim: "integrity" },
        { text: "我能迅速理解會計準則的邏輯並應用於實務。", dim: "analytical" },
        { text: "面對審計或稅務查核，我能保持冷靜與專業。", dim: "emotional" },
        { text: "我會主動追蹤未完成的任務直到結案。", dim: "responsibility" },
        { text: "我對小數點或單位換算特別敏感，不易出錯。", dim: "precision" },
        { text: "即使無人察覺，我也不會作假帳或隱瞞錯誤。", dim: "integrity" },
        { text: "我善於使用Excel或會計軟體進行資料比對與分析。", dim: "analytical" },
        { text: "我能承受月底結帳的高壓，不輕易離職或崩潰。", dim: "emotional" },
        { text: "我對自己的工作要求很高，會反覆校驗。", dim: "precision" },
        { text: "我認為會計師必須對客戶、公眾及法律負責。", dim: "integrity" }
    ];

    // 維度索引映射 (0-based)
    const INTEGRITY_IDX = [0,5,10,15,19];
    const PRECISION_IDX = [1,4,9,14,18];
    const RESPONSIBILITY_IDX = [3,8,13];
    const ANALYTICAL_IDX = [2,6,11,16];
    const EMOTIONAL_IDX = [7,12,17];
    
    let allSubmissions = [];

    function loadSubmissions() {
        const stored = localStorage.getItem("accountant_sales_submissions");
        if(stored) {
            try{ allSubmissions = JSON.parse(stored); if(!Array.isArray(allSubmissions)) allSubmissions = []; } catch(e){ allSubmissions = []; }
        } else { allSubmissions = []; }
        updateTeacherUI();
    }
    
    function saveSubmissions() {
        localStorage.setItem("accountant_sales_submissions", JSON.stringify(allSubmissions));
        updateTeacherUI();
    }
    
    function updateTeacherUI() {
        const countSpan = document.getElementById("submissionCountDisplay");
        if(countSpan) countSpan.innerText = `累積提交: ${allSubmissions.length} 筆`;
        const listContainer = document.getElementById("submissionList");
        if(listContainer) {
            if(allSubmissions.length === 0) {
                listContainer.innerHTML = `<div style="color: #769e6b; text-align: center; padding: 12px;">📭 尚無學員提交測驗</div>`;
                return;
            }
            let html = '';
            allSubmissions.slice().reverse().forEach(sub => {
                let date = new Date(sub.timestamp);
                let timeStr = `${date.getMonth()+1}/${date.getDate()} ${date.getHours()}:${date.getMinutes().toString().padStart(2,'0')}`;
                html += `<div class="submission-item">
                            <span><strong>${escapeHtml(sub.studentId)}</strong> 總分:${sub.totalScore} </span>
                            <span style="font-size:0.7rem;">誠:${sub.integrityScore} 精:${sub.precisionScore} 責:${sub.responsibilityScore} 析:${sub.analyticalScore} 穩:${sub.emotionalScore}</span>
                            <span style="font-size:0.6rem;">${timeStr}</span>
                         </div>`;
            });
            listContainer.innerHTML = html;
        }
    }
    
    function escapeHtml(str) { 
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); 
    }

    function renderQuestions() {
        const container = document.getElementById("questionsContainer");
        if(!container) return;
        let html = '';
        QUESTIONS.forEach((q, idx) => {
            html += `
                <div class="question-item">
                    <div class="q-text"><span class="q-num">${idx+1}</span><span>${escapeHtml(q.text)}</span></div>
                    <div class="scale" id="scale-${idx}">
                        ${[1,2,3,4,5].map(score => `
                            <label class="scale-option">
                                <input type="radio" name="q${idx}" value="${score}">
                                <span>${score}</span>
                            </label>
                        `).join('')}
                        <div class="scale-hint">① 非常不符  →  ⑤ 非常符合</div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function getCurrentAnswers() {
        let answers = new Array(20).fill(null);
        for(let i=0;i<20;i++) {
            let radios = document.querySelectorAll(`input[name="q${i}"]`);
            let selected = null;
            for(let r of radios) if(r.checked) { selected = parseInt(r.value,10); break; }
            answers[i] = selected;
        }
        return answers;
    }

    function computeScores(answers) {
        let integritySum = 0, precisionSum = 0, responsibilitySum = 0, analyticalSum = 0, emotionalSum = 0;
        for(let idx of INTEGRITY_IDX) integritySum += (answers[idx] || 0);
        for(let idx of PRECISION_IDX) precisionSum += (answers[idx] || 0);
        for(let idx of RESPONSIBILITY_IDX) responsibilitySum += (answers[idx] || 0);
        for(let idx of ANALYTICAL_IDX) analyticalSum += (answers[idx] || 0);
        for(let idx of EMOTIONAL_IDX) emotionalSum += (answers[idx] || 0);
        let total = integritySum + precisionSum + responsibilitySum + analyticalSum + emotionalSum;
        return { integrityScore: integritySum, precisionScore: precisionSum, responsibilityScore: responsibilitySum, analyticalScore: analyticalSum, emotionalScore: emotionalSum, totalScore: total };
    }

    function showFlowerAnalysis(studentId, scores) {
        const modal = document.getElementById("resultModal");
        const contentDiv = document.getElementById("modalScoreContent");
        let suggestion = "";
        if(scores.totalScore >= 85) suggestion = "🏆 卓越會計師潛能！高度誠信、精確與抗壓性，適合執業會計師。";
        else if(scores.totalScore >= 75) suggestion = "📊 優秀會計特質，細心負責，可朝記帳士或財務會計發展。";
        else if(scores.totalScore >= 65) suggestion = "🌱 具備基礎潛力，加強數字敏感度與職業道德訓練。";
        else suggestion = "📘 可探索會計輔助職能，或深化專業知識與責任感。";
        
        const flowerMsg = (scores.integrityScore >= 20) ? "⭐ 誠信值滿分，會計人首要美德！" : "🌿 持續提升正直態度會更出色";
        contentDiv.innerHTML = `
            <p><strong>學號：${escapeHtml(studentId)}</strong></p>
            <div class="score-detail">
                <p>📈 總分：${scores.totalScore} / 100</p>
                <p>⚖️ 誠信正直：${scores.integrityScore}/25</p>
                <p>🔍 細心精確：${scores.precisionScore}/25</p>
                <p>⛑️ 責任堅持：${scores.responsibilityScore}/15</p>
                <p>🧠 分析邏輯：${scores.analyticalScore}/20</p>
                <p>💪 情緒穩定：${scores.emotionalScore}/15</p>
                <p>💡 評語：${suggestion}</p>
                <p>🍀 ${flowerMsg}</p>
            </div>
        `;
        document.getElementById("flowerMessage").innerHTML = "🎁 你的會計師特質已揭曉！繼續保持潛能 ✨";
        modal.classList.add("active");
    }

    function submitAssessment() {
        const studentId = document.getElementById("studentId").value.trim();
        if(studentId === "") {
            alert("請輸入學號（例如 ACC2024001）才能進行測驗。");
            return;
        }
        const answers = getCurrentAnswers();
        const missing = [];
        for(let i=0;i<answers.length;i++) if(answers[i]===null) missing.push(i+1);
        if(missing.length > 0) {
            alert(`尚有第 ${missing.join(", ")} 題未作答，請完成所有題目後再提交。`);
            return;
        }
        const scores = computeScores(answers);
        const submissionRecord = {
            studentId: studentId,
            timestamp: Date.now(),
            answers: [...answers],
            integrityScore: scores.integrityScore,
            precisionScore: scores.precisionScore,
            responsibilityScore: scores.responsibilityScore,
            analyticalScore: scores.analyticalScore,
            emotionalScore: scores.emotionalScore,
            totalScore: scores.totalScore
        };
        allSubmissions.push(submissionRecord);
        saveSubmissions();
        showFlowerAnalysis(studentId, scores);
    }

    let teacherUnlocked = false;
    function showTeacherPanel() {
        if(teacherUnlocked) {
            document.getElementById("teacherPanel").classList.add("visible-panel");
            updateTeacherUI();
            return;
        }
        let pwd = prompt("🔐 教師專區需要管理密碼才能檢視答案收集系統。\n請輸入密碼：");
        if(pwd === "2002") {
            teacherUnlocked = true;
            document.getElementById("teacherPanel").classList.add("visible-panel");
            alert("教師專區已解鎖，可匯出數據與查看學員提交記錄。");
            updateTeacherUI();
        } else if(pwd !== null) {
            alert("密碼錯誤，無法進入教師專區。");
        }
    }

    function exportCSV() {
        if(allSubmissions.length === 0) {
            alert("目前無任何提交紀錄。");
            return;
        }
        let headers = ["學號","時間戳","總分","誠信正直(25)","細心精確(25)","責任堅持(15)","分析邏輯(20)","情緒穩定(15)"];
        for(let i=1;i<=20;i++) headers.push(`Q${i}_得分`);
        let rows = [headers];
        for(let sub of allSubmissions) {
            let row = [
                sub.studentId,
                new Date(sub.timestamp).toLocaleString(),
                sub.totalScore,
                sub.integrityScore,
                sub.precisionScore,
                sub.responsibilityScore,
                sub.analyticalScore,
                sub.emotionalScore
            ];
            for(let i=0;i<20;i++) row.push(sub.answers[i]);
            rows.push(row);
        }
        let csvContent = rows.map(row => row.map(cell => {
            if(typeof cell === 'string' && (cell.includes(',') || cell.includes('"'))) return `"${cell.replace(/"/g, '""')}"`;
            return cell;
        }).join(",")).join("\n");
        let blob = new Blob(["\uFEFF" + csvContent], {type: "text/csv;charset=utf-8;"});
        let link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "accountant_potential_data.csv";
        link.click();
        URL.revokeObjectURL(blob);
        alert("CSV已匯出，內含完整答題明細。");
    }

    function clearAllRecords() {
        if(confirm("⚠️ 警告：將清除所有學員測驗記錄，不可復原。確定嗎？")) {
            allSubmissions = [];
            saveSubmissions();
            alert("已清空所有提交資料。");
        }
    }

    function closeModal() {
        document.getElementById("resultModal").classList.remove("active");
    }

    function bindEvents() {
        document.getElementById("submitBtn").addEventListener("click", submitAssessment);
        document.getElementById("teacherPortalBtn").addEventListener("click", showTeacherPanel);
        document.getElementById("exportCsvBtn").addEventListener("click", exportCSV);
        document.getElementById("clearAllDataBtn").addEventListener("click", clearAllRecords);
        document.getElementById("closeModalBtn").addEventListener("click", closeModal);
        const modalOverlay = document.getElementById("resultModal");
        modalOverlay.addEventListener("click", function(e) {
            if(e.target === modalOverlay) closeModal();
        });
    }

    function init() {
        renderQuestions();
        loadSubmissions();
        bindEvents();
        document.getElementById("teacherPanel").classList.remove("visible-panel");
        teacherUnlocked = false;
    }
    init();
</script>
